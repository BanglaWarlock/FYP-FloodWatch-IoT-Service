#   min_machines_running = 1
#
#   [[services.ports]]
#     port = 8883
#
#   [[services.tcp_checks]]
#     interval     = "10s"
#     timeout      = "2s"
#     grace_period = "30s"

[[vm]]
  memory   = "256mb"    # Mosquitto is lightweight — this is plenty
  cpu_kind = "shared"
  cpus     = 1