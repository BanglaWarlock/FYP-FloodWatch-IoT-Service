# ============================================================
#  mosquitto.conf  —  Phase 1 open broker (no auth, no TLS)
#  Port 1883 — anyone can connect and subscribe/publish
#
#  To upgrade to TLS: see mosquitto-tls.conf
#  The docker-entrypoint.sh will auto-switch when certs appear.
# ============================================================

listener 1883 0.0.0.0
allow_anonymous true

# Persistence — retained messages survive container restarts
# Data goes to the Fly.io persistent volume mounted at /mosquitto/data
persistence true
persistence_location /mosquitto/data/

# Logging — stdout so Fly.io captures it with `fly logs`
log_dest stdout
log_type error warning notice information

# Max message size — 10KB is plenty for sensor payloads
message_size_limit 10240