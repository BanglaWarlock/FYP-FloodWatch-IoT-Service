# ============================================================
#  mosquitto-tls.conf  —  Phase 2 mTLS broker
#  Activated automatically by docker-entrypoint.sh when
#  /mosquitto/certs/ca.crt, server.crt, server.key exist.
#
#  Do not manually copy or run this — the entrypoint handles it.
# ============================================================

listener 8883 0.0.0.0
protocol mqtt

# CA and server identity
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Require client certs — each service has its own cert
require_certificate true
use_identity_as_username true

# ACL and auth
allow_anonymous false
acl_file /mosquitto/config/acl

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error warning notice information

message_size_limit 10240