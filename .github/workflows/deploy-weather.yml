name: Deploy weather poller to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "weather/**"
      - ".github/workflows/deploy-weather.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/floodwatch-weather:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push weather image
        uses: docker/build-push-action@v5
        with:
          context: ./weather
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key:      ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE }}

            sudo mkdir -p /opt/floodwatch
            cat << 'EOF' | sudo tee /opt/floodwatch/weather.env > /dev/null
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            WEATHER_POLL_INTERVAL=1800
            WEATHER_FORECAST_HOURS=24
            WEATHER_CALL_SPACING=1
            EOF

            docker stop floodwatch-weather 2>/dev/null || true
            docker rm   floodwatch-weather 2>/dev/null || true
            docker run -d \
              --name floodwatch-weather \
              --restart unless-stopped \
              --env-file /opt/floodwatch/weather.env \
              ${{ env.IMAGE }}

            echo "Weather poller deployed — $(docker inspect --format='{{.State.Status}}' floodwatch-weather)"
