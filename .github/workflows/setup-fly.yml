# ============================================================
#  setup-fly.yml  —  ONE-TIME setup for Fly.io
#
#  Run this manually once from GitHub Actions tab:
#  Actions → "First-time Fly.io setup" → Run workflow
#
#  Creates:
#    - The flood-mqtt-fyp app on Fly.io
#    - A 1GB persistent volume for retained messages
#  
#  Safe to re-run: fly apps create is idempotent (skips if exists)
# ============================================================

name: First-time Fly.io setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly.io app (skips if already exists)
        run: |
          flyctl apps list | grep -q "suts-fyp-floodwatch-mqtt" \
            && echo "App already exists, skipping create" \
            || flyctl apps create suts-fyp-floodwatch-mqtt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create persistent volume in Singapore (skips if exists)
        run: |
          flyctl volumes list --app suts-fyp-floodwatch-mqtt | grep -q "mosquitto_data" \
            && echo "Volume already exists, skipping" \
            || flyctl volumes create mosquitto_data \
                --region sin \
                --size 1 \
                --app suts-fyp-floodwatch-mqtt \
                --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure dedicated IPv4 (release shared if present, allocate dedicated)
        run: |
          IPS=$(flyctl ips list --app suts-fyp-floodwatch-mqtt --json)

          DEDICATED=$(echo "$IPS" | jq -r '.[] | select(.type=="public" and .version=="v4") | .address' | head -1)
          if [ -n "$DEDICATED" ]; then
            echo "Dedicated IPv4 already exists: $DEDICATED, skipping"
          else
            SHARED=$(echo "$IPS" | jq -r '.[] | select(.type=="shared_v4") | .address' | head -1)
            if [ -n "$SHARED" ]; then
              echo "Releasing shared IPv4: $SHARED"
              flyctl ips release "$SHARED" --app suts-fyp-floodwatch-mqtt
            fi
            echo "Allocating dedicated IPv4..."
            flyctl ips allocate-v4 --app suts-fyp-floodwatch-mqtt --yes
          fi

          echo "Current IPs:"
          flyctl ips list --app suts-fyp-floodwatch-mqtt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy initial broker
        run: |
          flyctl deploy \
            --app suts-fyp-floodwatch-mqtt \
            --config fly.toml \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Disable auto-stop on all machines
        run: |
          MACHINE_IDS=$(flyctl machine list --app suts-fyp-floodwatch-mqtt --json \
            | jq -r '.[].id')
          for ID in $MACHINE_IDS; do
            echo "Setting auto-stop=off on machine $ID"
            flyctl machine update "$ID" \
              --app suts-fyp-floodwatch-mqtt \
              --autostop=off \
              --yes
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for machine to start then confirm it stays up
        run: |
          echo "Waiting for machine to reach 'started' state..."
          for i in $(seq 1 24); do
            STATE=$(flyctl status --app suts-fyp-floodwatch-mqtt --json \
              | jq -r '.Machines[0].state // "unknown"')
            echo "Attempt $i/24: machine state = $STATE"
            if [ "$STATE" = "started" ]; then
              echo "Machine started. Waiting 60s to confirm it stays up..."
              sleep 60
              STATE=$(flyctl status --app suts-fyp-floodwatch-mqtt --json \
                | jq -r '.Machines[0].state // "unknown"')
              if [ "$STATE" = "started" ]; then
                echo "Machine is stable and still running."
                exit 0
              else
                echo "Machine stopped after 60s (state: $STATE)."
                echo "This is likely the Fly.io trial 5-minute limit."
                echo "Add a credit card at https://fly.io/trial to fix this."
                exit 1
              fi
            fi
            sleep 5
          done
          echo "Machine did not reach 'started' state within 2 minutes."
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Print result
        run: |
          echo "Broker is live at: suts-fyp-floodwatch-mqtt.fly.dev:1883"