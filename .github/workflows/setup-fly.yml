# ============================================================
#  setup-fly.yml  —  ONE-TIME setup for Fly.io
#
#  Run this manually once from GitHub Actions tab:
#  Actions → "First-time Fly.io setup" → Run workflow
#
#  Creates:
#    - The flood-mqtt-fyp app on Fly.io
#    - A 1GB persistent volume for retained messages
#  
#  Safe to re-run: fly apps create is idempotent (skips if exists)
# ============================================================

name: First-time Fly.io setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly.io app (skips if already exists)
        run: |
          flyctl apps list | grep -q "flood-mqtt-fyp" \
            && echo "App already exists, skipping create" \
            || flyctl apps create flood-mqtt-fyp
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create persistent volume in Singapore (skips if exists)
        run: |
          flyctl volumes list --app flood-mqtt-fyp | grep -q "mosquitto_data" \
            && echo "Volume already exists, skipping create" \
            || flyctl volumes create mosquitto_data \
                --region sin \
                --size 1 \
                --app flood-mqtt-fyp \
                --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy initial broker
        run: |
          flyctl deploy \
            --app flood-mqtt-fyp \
            --config fly.toml \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Print result
        run: |
          echo "Broker is live at: flood-mqtt-fyp.fly.dev:1883"