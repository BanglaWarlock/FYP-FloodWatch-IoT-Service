# ============================================================
#  setup-fly.yml  —  ONE-TIME setup for Fly.io
#
#  Run this manually once from GitHub Actions tab:
#  Actions → "First-time Fly.io setup" → Run workflow
#
#  Creates:
#    - The flood-mqtt-fyp app on Fly.io
#    - A 1GB persistent volume for retained messages
#  
#  Safe to re-run: fly apps create is idempotent (skips if exists)
# ============================================================

name: First-time Fly.io setup

on:
  workflow_dispatch:   # manual trigger only — never auto-runs

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly.io app (skips if already exists)
        run: |
          fly apps list | grep -q "flood-mqtt-fyp" \
            && echo "App already exists, skipping create" \
            || fly apps create flood-mqtt-fyp
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create persistent volume in Singapore (skips if exists)
        run: |
          fly volumes list --app flood-mqtt-fyp | grep -q "mosquitto_data" \
            && echo "Volume already exists, skipping create" \
            || fly volumes create mosquitto_data \
                --region sin \
                --size 1 \
                --app flood-mqtt-fyp \
                --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy initial broker
        run: fly deploy --app flood-mqtt-fyp --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Print result
        run: |
          echo ""
          echo "Setup complete. Broker is live at:"
          echo "  flood-mqtt-fyp.fly.dev:1883"
          echo ""
          echo "View logs: go to fly.io/apps/flood-mqtt-fyp/monitoring"