name: Deploy home-monitor to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "home_monitor/**"
      - ".github/workflows/deploy-home-monitor.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/floodwatch-home-monitor:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./home_monitor
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key:      ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE }}

            sudo mkdir -p /opt/floodwatch
            cat << 'EOF' | sudo tee /opt/floodwatch/home-monitor.env > /dev/null
            MQTT_BROKER=${{ secrets.MQTT_BROKER }}
            MQTT_PORT=1883
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            EOF

            docker stop floodwatch-home-monitor 2>/dev/null || true
            docker rm   floodwatch-home-monitor 2>/dev/null || true
            docker run -d \
              --name floodwatch-home-monitor \
              --restart unless-stopped \
              --env-file /opt/floodwatch/home-monitor.env \
              ${{ env.IMAGE }}

            echo "Home monitor deployed — $(docker inspect --format='{{.State.Status}}' floodwatch-home-monitor)"
