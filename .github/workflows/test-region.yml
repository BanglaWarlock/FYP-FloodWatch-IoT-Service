# ============================================================
#  test-region.yml
#
#  Manual trigger only — never auto-runs on push.
#
#  How to use:
#    1. Actions tab → "Deploy broker to test region"
#    2. "Run workflow" → pick a region → Run
#    3. Wait ~90 seconds for deploy to complete
#    4. Run: python scripts/test-region-latency.py
#    5. Compare results — pick the winning region
#
#  To clean up a test region (stop billing):
#    Actions → "Destroy test region broker" → pick region
# ============================================================

name: Deploy broker to test region

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Fly.io region to test'
        required: true
        default: 'hkg'
        type: choice
        options:
          - hkg   # Hong Kong
          - bom   # Mumbai
          - nrt   # Tokyo
          - syd   # Sydney
          - sin   # Singapore
          - lax   # Los Angeles (long baseline)

jobs:
  deploy-region-test:
    name: Deploy to ${{ inputs.region }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set app name
        id: names
        run: echo "app=flood-mqtt-test-${{ inputs.region }}" >> $GITHUB_OUTPUT

      - name: Create app (skips if exists)
        run: |
          flyctl apps list | grep -q "${{ steps.names.outputs.app }}" \
            && echo "App exists, skipping" \
            || flyctl apps create "${{ steps.names.outputs.app }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Create volume (skips if exists)
        run: |
          flyctl volumes list --app "${{ steps.names.outputs.app }}" \
            | grep -q "mosquitto_data" \
            && echo "Volume exists, skipping" \
            || flyctl volumes create mosquitto_data \
                --region ${{ inputs.region }} \
                --size 1 \
                --app "${{ steps.names.outputs.app }}" \
                --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to region
        run: |
          flyctl deploy \
            --app "${{ steps.names.outputs.app }}" \
            --config fly.toml \
            --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure dedicated IPv4
        run: |
          IPS=$(flyctl ips list --app "${{ steps.names.outputs.app }}" --json)
          DEDICATED=$(echo "$IPS" | jq -r '.[] | select(.type=="public" and .version=="v4") | .address' | head -1)
          if [ -n "$DEDICATED" ]; then
            echo "Dedicated IPv4 already exists: $DEDICATED, skipping"
          else
            SHARED=$(echo "$IPS" | jq -r '.[] | select(.type=="shared_v4") | .address' | head -1)
            if [ -n "$SHARED" ]; then
              echo "Releasing shared IPv4: $SHARED"
              flyctl ips release "$SHARED" --app "${{ steps.names.outputs.app }}"
            fi
            echo "Allocating dedicated IPv4..."
            flyctl ips allocate-v4 --app "${{ steps.names.outputs.app }}" --yes
          fi
          echo "Current IPs:"
          flyctl ips list --app "${{ steps.names.outputs.app }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Disable auto-stop
        run: |
          MACHINE_IDS=$(flyctl machine list --app "${{ steps.names.outputs.app }}" --json \
            | jq -r '.[].id')
          for ID in $MACHINE_IDS; do
            echo "Setting autostop=off on machine $ID"
            flyctl machine update "$ID" \
              --app "${{ steps.names.outputs.app }}" \
              --autostop=off \
              --yes
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Print test instructions
        run: |
          echo ""
          echo "======================================================"
          echo "  Broker deployed to ${{ inputs.region }}"
          echo "======================================================"
          echo ""
          echo "  Host: ${{ steps.names.outputs.app }}.fly.dev"
          echo "  Port: 1883"
          echo ""
          echo "  Run latency test from your machine:"
          echo "    pip install paho-mqtt"
          echo "    python scripts/test-region-latency.py"
          echo ""
          echo "  Run stress test:"
          echo "    python scripts/test-region-latency.py --stress"
          echo ""
          echo "  Test a single broker:"
          echo "    python scripts/test-region-latency.py \\"
          echo "      --broker ${{ steps.names.outputs.app }}.fly.dev"
          echo ""
          echo "  Auto-cleanup after test:"
          echo "    python scripts/test-region-latency.py --cleanup"
          echo ""
          echo "  Or manually: Actions → Destroy test region broker → ${{ inputs.region }}"
          echo "======================================================"
