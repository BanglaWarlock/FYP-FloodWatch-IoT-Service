# ============================================================
#  deploy-services.yml
#
#  Triggers: push to main that changes any service directory
#  Does:
#    1. Detects which services changed (path filtering)
#    2. Builds only those Docker images, pushes to GHCR
#    3. SSHes into DigitalOcean, pulls new images, redeploys
#    4. Health check confirms API is up
# ============================================================

name: Deploy services to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'parser/**'
      - 'health-checker/**'
      - 'api/**'
      - 'simulator/**'
      - 'nginx/**'
      - 'docker-compose.yml'

jobs:
  # ── Job 1: Detect which services actually changed ──────────────
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      parser:         ${{ steps.filter.outputs.parser }}
      health_checker: ${{ steps.filter.outputs.health_checker }}
      api:            ${{ steps.filter.outputs.api }}
      simulator:      ${{ steps.filter.outputs.simulator }}
      nginx:          ${{ steps.filter.outputs.nginx }}
      compose:        ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            parser:
              - 'parser/**'
            health_checker:
              - 'health-checker/**'
            api:
              - 'api/**'
            simulator:
              - 'simulator/**'
            nginx:
              - 'nginx/**'
            compose:
              - 'docker-compose.yml'

  # ── Jobs 2-5: Build only what changed ─────────────────────────
  # Each job is independent — they run in parallel.
  # A job is skipped entirely (not just steps) when its service didn't change.

  build-parser:
    name: Build parser image
    needs: detect
    if: needs.detect.outputs.parser == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./parser
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flood-parser:latest
            ghcr.io/${{ github.repository_owner }}/flood-parser:${{ github.sha }}

  build-health-checker:
    name: Build health-checker image
    needs: detect
    if: needs.detect.outputs.health_checker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./health-checker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flood-health-checker:latest
            ghcr.io/${{ github.repository_owner }}/flood-health-checker:${{ github.sha }}

  build-api:
    name: Build API image
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flood-api:latest
            ghcr.io/${{ github.repository_owner }}/flood-api:${{ github.sha }}

  build-simulator:
    name: Build simulator image
    needs: detect
    if: needs.detect.outputs.simulator == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./simulator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flood-simulator:latest
            ghcr.io/${{ github.repository_owner }}/flood-simulator:${{ github.sha }}

  # ── Job 6: Deploy to DigitalOcean ─────────────────────────────
  # Runs after all build jobs (whether they ran or were skipped).
  # `always() && !failure()` means:
  #   - runs even if some build jobs were skipped (no changes)
  #   - does NOT run if any build job FAILED
  deploy:
    name: Deploy to DigitalOcean
    needs:
      - detect
      - build-parser
      - build-health-checker
      - build-api
      - build-simulator
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd ~/flood-monitor

            # Pull latest repo state
            git pull origin main

            # Authenticate with GHCR to pull new images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull updated images (unchanged services keep their cached layers)
            docker compose pull

            # Restart with new images, remove orphaned containers
            docker compose up -d --remove-orphans

            # Wait for startup
            sleep 15

            # Health check — fails the workflow if API is not responding
            curl -sf http://localhost/api/health \
              && echo "✓ API health check passed" \
              || (echo "✗ API health check failed — rolling back" && exit 1)