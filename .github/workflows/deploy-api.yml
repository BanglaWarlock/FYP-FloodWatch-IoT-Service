name: Deploy API to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/floodwatch-api:latest

      - name: Deploy to DigitalOcean Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/${{ github.repository_owner }}/floodwatch-api:latest

            # Internal network so containers reach each other by name
            docker network create floodwatch-net 2>/dev/null || true

            # ── Redis ────────────────────────────────────────────
            # Keep running across API deploys (pub/sub state is ephemeral).
            # Exposed on 6379 so the EC2 parser can publish to it.
            # Restrict this port to EC2's IP in the DO firewall.
            docker start floodwatch-redis 2>/dev/null || \
              docker run -d \
                --name floodwatch-redis \
                --network floodwatch-net \
                --restart unless-stopped \
                -p 6379:6379 \
                redis:7-alpine \
                redis-server --requirepass "${{ secrets.REDIS_PASSWORD }}"
            docker network connect floodwatch-net floodwatch-redis 2>/dev/null || true

            # ── Nginx config ─────────────────────────────────────
            mkdir -p /opt/floodwatch
            cat > /opt/floodwatch/nginx.conf << 'NGINXEOF'
            server {
                listen 80;

                location / {
                    proxy_pass         http://floodwatch-api:8000;
                    proxy_set_header   Host              $host;
                    proxy_set_header   X-Real-IP         $remote_addr;
                    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

                    # SSE: disable all buffering so events reach clients immediately
                    proxy_buffering    off;
                    proxy_cache        off;
                    proxy_read_timeout 24h;
                    proxy_http_version 1.1;
                    proxy_set_header   Connection        '';
                    add_header         X-Accel-Buffering no;
                }
            }
            NGINXEOF

            # ── API env ──────────────────────────────────────────
            # Redis URL uses container name — stays internal to Docker network.
            # The parser on EC2 uses its own REDIS_URL secret (public IP).
            cat > /opt/floodwatch/api.env << 'EOF'
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB=${{ secrets.MONGO_DB }}
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@floodwatch-redis:6379
            EOF

            # ── API ──────────────────────────────────────────────
            docker stop floodwatch-api 2>/dev/null || true
            docker rm   floodwatch-api 2>/dev/null || true
            docker run -d \
              --name floodwatch-api \
              --network floodwatch-net \
              --restart unless-stopped \
              --env-file /opt/floodwatch/api.env \
              ghcr.io/${{ github.repository_owner }}/floodwatch-api:latest

            # ── Nginx ────────────────────────────────────────────
            docker stop floodwatch-nginx 2>/dev/null || true
            docker rm   floodwatch-nginx 2>/dev/null || true
            docker run -d \
              --name floodwatch-nginx \
              --network floodwatch-net \
              --restart unless-stopped \
              -p 80:80 \
              -v /opt/floodwatch/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
              nginx:alpine

            echo "─── Deployed ───────────────────────────────────"
            echo "  API    — $(docker inspect --format='{{.State.Status}}' floodwatch-api)"
            echo "  nginx  — $(docker inspect --format='{{.State.Status}}' floodwatch-nginx)"
            echo "  Redis  — $(docker inspect --format='{{.State.Status}}' floodwatch-redis)"
